name: Deploy to Dev

on:
  push:
    branches:
      - Dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://${{ secrets.DEV_HOST }}/api
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEV_HOST }} >> ~/.ssh/known_hosts

      - name: Copy frontend build to server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEV_HOST }} \
            "mkdir -p /opt/occumax/frontend/dist"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ \
            ubuntu@${{ secrets.DEV_HOST }}:/opt/occumax/frontend/dist/

      - name: Deploy backend & restart
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEV_HOST: ${{ secrets.DEV_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEV_HOST }} \
            GH_TOKEN="$GH_TOKEN" \
            DEV_DATABASE_URL="$DEV_DATABASE_URL" \
            GEMINI_API_KEY="$GEMINI_API_KEY" \
            DEV_HOST="$DEV_HOST" \
            bash << 'ENDSSH'
            set -e

            REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/niteshsinwar/occumax.git"

            # If dir exists but is not a git repo, remove and reclone
            if [ -d "/opt/occumax" ] && [ ! -d "/opt/occumax/.git" ]; then
              sudo rm -rf /opt/occumax
            fi

            if [ ! -d "/opt/occumax/.git" ]; then
              git clone "$REPO_URL" /opt/occumax
            fi

            cd /opt/occumax
            git remote set-url origin "$REPO_URL"
            git fetch origin
            git checkout Dev
            git reset --hard origin/Dev

            # Build .env from repo config + injected secrets
            cat /opt/occumax/backend/.env.server > /opt/occumax/.env
            echo "DATABASE_URL=${DEV_DATABASE_URL}" >> /opt/occumax/.env
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> /opt/occumax/.env
            echo "CORS_ORIGINS=http://${DEV_HOST}" >> /opt/occumax/.env

            # Install Python dependencies
            /opt/occumax/venv/bin/pip install -r /opt/occumax/backend/requirements.txt -q

            # Restart backend (create_tables() on startup handles schema changes)
            sudo systemctl restart occumax-backend
            sleep 5
            sudo systemctl is-active occumax-backend
            curl -sf http://localhost:8000/docs > /dev/null && echo "Backend OK"
          ENDSSH

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.DEV_HOST }} \
            "sudo systemctl reload nginx"

      - name: Health check
        run: |
          sleep 3
          curl -f http://${{ secrets.DEV_HOST }}/ || exit 1
          echo "Dev deployment successful — http://${{ secrets.DEV_HOST }}"
