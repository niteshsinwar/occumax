name: Deploy to Dev

on:
  push:
    branches:
      - Dev

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      branch: Dev
      env_prefix: Dev
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      HOST: ${{ secrets.DEV_HOST }}
      DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
