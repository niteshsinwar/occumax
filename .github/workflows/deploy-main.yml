name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://${{ secrets.MAIN_HOST }}/api
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.MAIN_HOST }} >> ~/.ssh/known_hosts

      - name: Copy frontend build to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ \
            ubuntu@${{ secrets.MAIN_HOST }}:/opt/occumax/frontend/dist/

      - name: Deploy backend & restart
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.MAIN_HOST }} \
            GH_TOKEN="${{ secrets.GH_TOKEN }}" \
            MAIN_DATABASE_URL="${{ secrets.MAIN_DATABASE_URL }}" \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            MAIN_HOST="${{ secrets.MAIN_HOST }}" \
            bash << 'ENDSSH'
            set -e
            cd /opt/occumax 2>/dev/null || git clone https://x-access-token:${GH_TOKEN}@github.com/niteshsinwar/occumax.git /opt/occumax && cd /opt/occumax

            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/niteshsinwar/occumax.git
            git fetch origin && git checkout main && git reset --hard origin/main

            # Build .env from repo config + injected secrets
            cat /opt/occumax/backend/.env.server > /opt/occumax/.env
            echo "DATABASE_URL=${MAIN_DATABASE_URL}" >> /opt/occumax/.env
            echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> /opt/occumax/.env
            echo "CORS_ORIGINS=http://${MAIN_HOST}" >> /opt/occumax/.env

            # Install Python dependencies
            /opt/occumax/venv/bin/pip install -r /opt/occumax/backend/requirements.txt -q

            # Restart backend (create_tables() on startup handles schema changes)
            sudo systemctl restart occumax-backend
            sleep 5
            sudo systemctl is-active occumax-backend
            curl -sf http://localhost:8000/docs > /dev/null && echo "Backend OK"
          ENDSSH

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.MAIN_HOST }} \
            "sudo systemctl reload nginx"

      - name: Health check
        run: |
          sleep 3
          curl -f http://${{ secrets.MAIN_HOST }}/ || exit 1
          echo "Production deployment successful — http://${{ secrets.MAIN_HOST }}"
